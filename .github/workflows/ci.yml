name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Least-privilege defaults — applied to every job in this workflow.
# Override at the job level only when a specific job needs more.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: omnidiff
          POSTGRES_PASSWORD: omnidiff
          POSTGRES_DB: omnidiff
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omnidiff"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://omnidiff:omnidiff@localhost:5432/omnidiff
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras
      - run: uv run ruff check app/ tests/
      - run: uv run pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  core:
    name: core (rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test --all-targets
