name: Build wheels (omnidiff-core)

# Build cross-platform wheels for the Rust core layer.
# Triggered on release tags or manually — NOT on every PR (would burn CI minutes).
on:
  push:
    tags:
      - "core-v*"
  workflow_dispatch:

# Least-privilege defaults. Wheel-publishing jobs may need contents:write
# (release upload) or id-token:write (PyPI trusted publishing) later — but
# those are explicit choices, not silent defaults.
permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: core
          target: ${{ matrix.target }}
          args: --release --out dist --strip
          sccache: true
          manylinux: auto

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: core/dist/*.whl
