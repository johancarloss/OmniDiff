name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        OmniDiff is a personal portfolio project with a defined roadmap
        (see [Current Status](../../README.md#current-status)). Feature
        requests outside the roadmap are read but unlikely to be picked
        up unless they clearly fit the project's direction.

        For open discussion of ideas before filing, prefer
        [Discussions](https://github.com/johancarloss/OmniDiff/discussions).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
